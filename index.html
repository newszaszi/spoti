<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Spotify Sötét Widget</title>
    <style>
        /* Eltüntetünk minden margót és gördítősávot */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Ez a Notion sötét módjának a pontos háttérszíne */
            background-color: #191919; 
            overflow: hidden;
        }

        /* Az iframe-et rásimítjuk a teljes kijelzőre border nélkül */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            border-radius: 12px; /* Lekerekített sarkok, mint a Notion gyári blokkjainál */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://open.spotify.com/playlist/43dXg6MFDkyIrSa513n5gD?si=77f08dd53db94d12?theme=0" 
        allowfullscreen="" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
    </iframe>

</body>
</html>
