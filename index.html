<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Spotify Sötét Widget</title>
    <style>
        /* Teljesen rásimítjuk a widgetet a Notion hátterére margók nélkül */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #191919; /* A Notion sötét módjának pontos háttérszíne */
            overflow: hidden;
        }

        /* Az iframe kitölti a rendelkezésre álló helyet, így a Notionben szabadon átméretezheted */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            border-radius: 12px; /* Lekerekített sarkok esztétikus megjelenésért */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://open.spotify.com/embed/playlist/7wP5Zis77zVofJ5YgTst9n?utm_source=generator&theme=0" 
        allowfullscreen="" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
    </iframe>

</body>
</html>
